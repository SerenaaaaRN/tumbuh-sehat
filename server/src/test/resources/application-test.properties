# =============================================
# TEST CONFIG — H2 In-Memory Database
# =============================================
spring.application.name=nutricare-test
server.port=0

# H2 In-Memory (PostgreSQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA — buat schema dari entity definitions
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# JWT — dummy key untuk testing
app.jwt.secret=dGhpcyBpcyBhIHRlc3Qgc2VjcmV0IGZvciBqd3QgdG9rZW4gZ2VuZXJhdGlvbiB0ZXN0aW5nIHB1cnBvc2Vz
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# Gemini — dummy (akan di-mock)
gemini.api.key=test-key
gemini.api.url-text=https://test.gemini.com/v1/models/gemini-flash:generateContent
gemini.api.url-vision=https://test.gemini.com/v1/models/gemini-pro-vision:generateContent

# Supabase — dummy
supabase.url=https://test.supabase.co
supabase.key=test-key
supabase.bucket=test-bucket

# Pinata — dummy (akan di-mock)
pinata.api-key=test-key
pinata.secret-key=test-secret
pinata.api-url=https://test.pinata.cloud
pinata.gateway-url=https://test.gateway.pinata.cloud/ipfs

# Polygon — dummy
polygon.rpc-url=https://test.polygon.com
polygon.chain-id=80001
polygon.registry-contract=0x0000000000000000000000000000000000000000
polygon.vc-registry-contract=0x0000000000000000000000000000000000000000
polygon.anchor-private-key=0x0000000000000000000000000000000000000000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:8081

# Blockchain simulation
app.blockchain.simulation=true

# Async & Scheduling — matikan untuk testing
spring.task.execution.pool.core-size=1
spring.task.execution.pool.max-size=1
spring.task.scheduling.pool.size=1
spring.task.scheduling.pool.core-size=1
spring.main.lazy-initialization=true
